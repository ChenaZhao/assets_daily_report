<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --border: #1f2937;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #475569;
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.12);
    --blue-border: rgba(59,130,246,0.3);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.10);
    --purple: #a855f7;
    --purple-dim: rgba(168,85,247,0.10);
  }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 64px 24px 48px;
  }
  .header { text-align: center; margin-bottom: 64px; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--blue);
    background: var(--blue-dim); border: 1px solid var(--blue-border);
    border-radius: 20px; padding: 4px 12px; margin-bottom: 20px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  h1 { font-size: 38px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 12px; }
  h1 span { color: var(--blue); }
  .subtitle { color: var(--text-secondary); font-size: 14px; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; width: 100%; max-width: 900px; }

  .card {
    position: relative;
    border-radius: 16px;
    padding: 28px 24px 22px;
    border: 1px solid var(--border);
    background: var(--surface);
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    min-height: 210px;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
  }
  .card.active:hover { transform: translateY(-3px); }
  .card.active.blue:hover { border-color: var(--blue-border); box-shadow: 0 8px 32px rgba(59,130,246,0.14); }
  .card.inactive { opacity: 0.35; pointer-events: none; }

  .card::before {
    content: ''; position: absolute; top: 0; left: 24px; right: 24px;
    height: 2px; border-radius: 0 0 2px 2px; opacity: 0; transition: opacity 0.18s;
  }
  .card.active:hover::before { opacity: 1; }
  .blue::before { background: var(--blue); }
  .green::before { background: var(--green); }
  .purple::before { background: var(--purple); }

  .icon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-bottom: 16px;
  }
  .blue .icon { background: var(--blue-dim); }
  .green .icon { background: var(--green-dim); }
  .purple .icon { background: var(--purple-dim); }

  .meta { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .blue .meta { color: var(--blue); }
  .green .meta { color: var(--green); }
  .purple .meta { color: var(--purple); }

  .title { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
  .desc { font-size: 12px; color: var(--text-secondary); line-height: 1.75; flex: 1; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border);
    font-size: 11px;
  }
  .status { display: inline-flex; align-items: center; gap: 5px; color: var(--text-muted); }
  .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
  .status.live { color: var(--green); }
  .status.live::before { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: var(--border); color: var(--text-muted); }
  .arrow { color: var(--text-muted); font-size: 15px; transition: color 0.15s, transform 0.15s; }
  .card.active:hover .arrow { color: var(--blue); transform: translateX(2px); }

  .footer { margin-top: 52px; color: var(--text-muted); font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow"><span class="dot"></span>Internal Use Only</div>
  <h1>Research <span>Hub</span></h1>
  <p class="subtitle">内部研究平台 · 点击模块进入对应系统</p>
</div>

<div class="grid">

  <a class="card active blue" href="https://chenazhao.github.io/assets_daily_report/asset/">
    <div class="icon">📊</div>
    <div class="meta">Asset Layer</div>
    <div class="title">资产层日报</div>
    <div class="desc">宏观 &amp; 大类资产<br>期货日报 · 权益日报<br>每日复盘与市场观点</div>
    <div class="card-footer">
      <span class="status live">运行中</span>
      <span class="arrow">→</span>
    </div>
  </a>

  <div class="card inactive green">
    <div class="icon">🔬</div>
    <div class="meta">Strategy Layer</div>
    <div class="title">策略层报告</div>
    <div class="desc">量化策略研究<br>因子分析 · 回测报告<br>择时系统输出</div>
    <div class="card-footer">
      <span class="status">即将上线</span>
      <span class="badge">Coming Soon</span>
    </div>
  </div>

  <div class="card inactive purple">
    <div class="icon">📁</div>
    <div class="meta">Reserved</div>
    <div class="title">更多模块</div>
    <div class="desc">待规划</div>
    <div class="card-footer">
      <span class="status">规划中</span>
      <span class="badge">TBD</span>
    </div>
  </div>

</div>

<div class="footer">Internal Research Platform · 请勿外传</div>

</body>
</html>
